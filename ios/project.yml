# XcodeGen spec — generates ClawNest.xcodeproj.
# Install XcodeGen once:  brew install xcodegen
# Then from ios/:         xcodegen generate
#
# After generating, open ClawNest.xcodeproj in Xcode, set your Signing Team
# (Signing & Capabilities), plug in your iPhone and Run — or archive an .ipa
# and sideload it (see README-ios.md).
name: ClawNest
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: 0.8.0
  # swift-nio is a transitive dep of Citadel; declared explicitly so the port-forwarder
  # (ForwardHandler / SSHTunnel) can import NIOCore + NIOPosix directly.
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: 2.65.0

targets:
  ClawNest:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ClawNest
        excludes:
          - App/Info.plist   # referenced via INFOPLIST_FILE, not compiled/bundled as a resource
    dependencies:
      - package: Citadel
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.clawnest
        INFOPLIST_FILE: ClawNest/App/Info.plist
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "10"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Set your own team in Xcode (Signing & Capabilities) after generating.
        # DEVELOPMENT_TEAM: XXXXXXXXXX
        CODE_SIGN_STYLE: Automatic

# A shared scheme so `xcodebuild -scheme ClawNest` works in CI (GitHub Actions).
schemes:
  ClawNest:
    build:
      targets:
        ClawNest: all
    run:
      config: Debug
    archive:
      config: Release
